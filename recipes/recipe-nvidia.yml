---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: ieburela-kinoite-nvidia
# description will be included in the image's metadata
description: Imagen inmutable personalizada para CAD basada en Fedora Kinoite

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: 44

# module configuration, executed in order
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* into your image's root folder /

  # DESCARGAR E INSTALAR SEAFILE DRIVE APPIMAGE
  - type: script
    snippets:
      - "curl -L -o /usr/bin/seadrive https://sos-ch-dk-2.exo.io/seafile-downloads/SeaDrive-x86_64-3.0.23.AppImage"
      - "chmod +x /usr/bin/seadrive"

  # INSTALACIÓN DE PAQUETES (SISTEMA BASE)
  - type: rpm-ostree
    install:
      - hplip
      - hplip-gui
      - tailscale
      - distrobox
      - podman
      - zsh
      - clamav
      - clamav-update
      - usbguard
      - tpm2-tools
      - freeipa-client
      - sssd-ipa
      - oddjob-mkhomedir
      - cachefilesd
      - nfs-utils
    remove:
      - firefox
      - firefox-langpacks

  # HABILITAR SERVICIOS (SEGURIDAD Y RED)
  - type: systemd
    system:
      enabled:
        - tailscaled.service
        - usbguard.service
        - clamav-freshclam.service
        - cachefilesd.service
        - firewalld.service

  # CONFIGURACIÓN DE FIREWALL Y ZONA HORARIA
  - type: script
    snippets:
      - "firewall-offline-cmd --set-default-zone=drop"
      - "firewall-offline-cmd --zone=drop --add-service=ssh"
      - "ln -sf /usr/share/zoneinfo/America/Mexico_City /etc/localtime"

  # APLICACIONES DE USUARIO (FLATPAKS)
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.videolan.VLC
          - com.spotify.Client
          - com.mastermindzh.tidal-hifi
          - org.onlyoffice.desktopeditors
          - com.super_productivity.SuperProductivity
          - org.mozilla.Thunderbird
          - org.keepassxc.KeePassXC
          - me.proton.Pass
          - org.signal.Signal
          - chat.rocket.RocketChat
          - org.gimp.GIMP
          - org.kde.krita
          - org.cloudcompare.CloudCompare

  - type: signing # this sets up the proper policy & signing files for signed images to work fully

  # CUSTOM BRANDING
  - type: os-release
    properties:
      PRETTY_NAME: "IEBurela Fedora 44"
      NAME: "IEBurela CAD OS"
      LOGO: "ieburela-logo"
